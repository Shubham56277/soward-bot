services:
  lavalink:
    image: ghcr.io/topi314/lavalink-yt-dlp:v4.0.8
    container_name: lavalink
    restart: unless-stopped
    cpus: 1.5
    mem_limit: 1024m
    environment:
      - _JAVA_OPTIONS=-Xms128M -Xmx768M
      - SERVER_PORT=2333
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
      - ./plugins:/opt/Lavalink/plugins
      - ./logs:/opt/Lavalink/logs
    networks:
      - lavalink
    expose:
      - 2333
    ports:
      - "127.0.0.1:2333:2333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2333/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  lavalink:
    name: lavalink
