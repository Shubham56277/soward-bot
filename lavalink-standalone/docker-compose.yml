services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    mem_limit: 1024m
    environment:
      - _JAVA_OPTIONS=-Xms128M -Xmx768M
      - SERVER_PORT=2333
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
      - ./plugins:/opt/Lavalink/plugins
      - ./logs:/opt/Lavalink/logs
    ports:
      - "2333:2333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Authorization: SowardLavalink2025' http://localhost:2333/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
